services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - ./database/milvus/etcd:/etcd
    networks:
      - milvus-network
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - ./database/milvus/minio:/minio_data
    networks:
      - milvus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.6.17
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MQ_TYPE: woodpecker
    volumes:
      - ./database/milvus/milvus:/var/lib/milvus
    ports:
      - "19530:19530"
    depends_on:
      - etcd
      - minio
    networks:
      - milvus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 90s

  feishu-agent:
    build:
      context: ./feishu_agent
      dockerfile: Dockerfile
    container_name: feishu-agent
    env_file:
      - ./.env
    environment:
      # MILVUS_HOST: milvus
      # MILVUS_PORT: 19530
      # EMBEDDING_MODEL_PATH: /app/models/bge-m3
      # RERANK_MODEL_PATH: /app/models/bge-reranker-v2-m3
      PYTHONUNBUFFERED: 1
    volumes:
      - ./logs:/app/logs
      - ./database:/app/database
      - ./models:/app/models
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - milvus-network

  openwebui-agent:
    build:
      context: ./openwebui_agent
      dockerfile: Dockerfile
    container_name: openwebui_agent
    env_file:
      - ./.env
    environment:
      # MILVUS_HOST: milvus
      # MILVUS_PORT: 19530
      # EMBEDDING_MODEL_PATH: /app/models/bge-m3
      # RERANK_MODEL_PATH: /app/models/bge-reranker-v2-m3
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./database:/app/database
      - ./models:/app/models
    depends_on:
      milvus:
        condition: service_healthy
    networks:
      - milvus-network

  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main-slim
    environment:
      - ENABLE_FORWARD_USER_INFO_HEADERS=true
    ports:
      - "3000:8080"
    volumes:
      - ./database/open-webui:/app/backend/data
    networks:
      - milvus-network

networks:
  milvus-network:
    driver: bridge